// Modified 2026-07-02
// Waterfall config for Zhuque-3 interstage RCS and second stage RCS

// =============================================================================
// INTERSTAGE — Cold gas separation RCS
// =============================================================================

@PART[KCLV_Zhuque3_Interstage_RCS]:NEEDS[Waterfall]:FINAL
{
    !EFFECTS {}
    EFFECTS
    {
        running
        {
            AUDIO_MULTI_POOL
            {
                channel = Ship
                transformName = RCS
                clip = sound_rocket_mini
                volume = 0.0 0.0
                volume = 0.02 0.1
                volume = 0.5 0.1
                volume = 1.0 0.1
                pitch = 0.0 0.75
                pitch = 1.0 1.5
                loop = true
            }
        }
    }

    MODULE
    {
        name = ModuleWaterfallFX
        moduleID = ZQ3_Interstage_RCS
        engineID = basicEngine

        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        CONTROLLER
        {
            name = rcs
            linkedTo = rcs
        }
        TEMPLATE
        {
            templateName = ColdGasRCS
            overrideParentTransform = RCS
            position = 0,0,0
            rotation = 0, 0, 180
            scale = 1, 3, 1
            @scale[*] *= #$/rescaleFactor$
        }
    }
}

// =============================================================================
// SECOND STAGE — Built-in RCS thrusters
// =============================================================================

@PART[KCLV_ZQ3_Stage_2]:NEEDS[Waterfall]:FINAL
{
    !EFFECTS {}
    EFFECTS
