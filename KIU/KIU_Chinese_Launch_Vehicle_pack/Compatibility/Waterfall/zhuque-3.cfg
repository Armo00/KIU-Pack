            {
                channel = Ship
                transformName = RCS
                clip = sound_rocket_mini
                volume = 0.0 0.0
                volume = 0.02 0.1
                volume = 0.5 0.1
                volume = 1.0 0.1
                pitch = 0.0 0.75
                pitch = 1.0 1.5
                loop = true
            }
        }
    }

    MODULE
    {
        name = ModuleWaterfallFX
        moduleID = ZQ3_Stage2_RCS
        engineID = basicEngine

        CONTROLLER
