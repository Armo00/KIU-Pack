            overrideParentTransform = thrustTransform3
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 0.9, 0.9, 2
            @scale[*] *= #$/rescaleFactor$
        }
        TEMPLATE
        {
            templateName = stock-kerolox-generator
            overrideParentTransform = smokePoint
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 2.0, 1.5, 2.5
            @scale[*] *= #$/rescaleFactor$
        }
    }
    MODULE
    {
        name = ModuleWaterfallFX
        moduleID = TQ12A_V3_Mode5
        engineID = TQ12A_V3
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        CONTROLLER
        {
            name = throttle
            linkedTo = custom
        }
        CONTROLLER
        {
            name = random
            linkedTo = random
            range = 0,1
        }
        TEMPLATE
        {
            templateName = TQ-12
            overrideParentTransform = thrustTransform5
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 0.9, 0.9, 2
            @scale[*] *= #$/rescaleFactor$
        }
        TEMPLATE
        {
            templateName = stock-kerolox-generator
            overrideParentTransform = smokePoint
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 3.0, 2.0, 3.5
            @scale[*] *= #$/rescaleFactor$
        }
    }
    MODULE
    {
        name = ModuleWaterfallFX
        moduleID = TQ12A_V3_Mode9
        engineID = TQ12A_V3
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        CONTROLLER
        {
            name = throttle
            linkedTo = custom
        }
        CONTROLLER
        {
            name = random
            linkedTo = random
            range = 0,1
        }
        TEMPLATE
        {
            templateName = TQ-12
            overrideParentTransform = thrustTransform
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 0.9, 0.9, 2
            @scale[*] *= #$/rescaleFactor$
        }
        TEMPLATE
        {
            templateName = stock-kerolox-generator
            overrideParentTransform = smokePoint
            position = 0,0,0
            rotation = 0, 0, 0
            scale = 4.0, 2.5, 5.0
            @scale[*] *= #$/rescaleFactor$
        }
    }
}
