// Modified 2026-07-03
//
// TQ Engine Series — Unified RF Configuration
// All TQ-family engines consolidated here from zhuque-2.cfg and zhuque-3.cfg
//
// Parts:   KCLV_TQ-11                          Vernier engine (ZQ-2)
//          KCLV_TQ12                            Vacuum main engine (ZQ-2)
//          KCLV_TQ13_With_Shell                 4-engine cluster (ZQ-2)
//          KCLV_TQ-12A_Series                   Single liftoff engine (ZQ-3)
//          KCLV_TQ-12A_Series_Engine_Cluster    9-engine cluster (ZQ-3)
//          KCLV_TQ15A                           Vacuum upper stage engine (ZQ-2/ZQ-3)
//
// Naming convention: <Series>_<Variant>
//   dev     = Early development version
//   STD_XX  = Standard version, XX = thrust percentage
//   xN      = N-engine cluster
//   TQ-12B  = Next-generation upgrade


// =============================================================================
// TQ-11 — VERNIER ENGINE
// Zhuque-2 vernier (游机), methalox, fixed thrust
// Mass: 0.1t, ISP: 333s Vac / 200s SL
// =============================================================================

@PART[KCLV_TQ-11]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.1
    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = TQ-11
        origMass = 0.1
        modded = false

        CONFIG
        {
            name = TQ-11
            description = TQ-11是朱雀2号上使用的游动发动机(游机)。固定推力20kN，用于姿态控制和末速修正。
            minThrust = 20
            maxThrust = 20
            heatProduction = 100
            massMult = 1.0
            ullage = True
            pressureFed = False
            ignitions = 10
            PROPELLANT
            {
                name = LqdMethane
                ratio = 0.4137
                DrawGauge = true
            }
            PROPELLANT
            {
                name = LqdOxygen
                ratio = 0.5863
            }
            atmosphereCurve
            {
                key = 0 333
                key = 1 200
            }
            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 1.0
            }
        }
    }
}


