// Modified 2026-07-03
//
// Zhuque-3 Specification (RF Compatibility Patch)
//
// === Mass Budget ===
// S1 Propellant: 395t   S1 Dry: 40.3t (incl. fairing 2.5t)
// S2 Propellant: 114t   S2 Dry: 6.8t
// Fairing: 2.5t (separate part, counted in S1 dry)
// Total Propellant: 509t   Total Dry: 47.1t
// Gross mass (11.8t payload): 570t
//
// === S1 Aerodynamic/Recovery Parts ===
// 4x Landing Leg: 0.5t each = 2.0t
// 4x Grid Fin: 0.15t each = 0.6t
// Interstage: 0.3t
// Engine Shell: 0.1t
//
// === TQ-12A (ZQ-3) Engine Specs ===
// Gas Generator, Methalox
// 100% Thrust: 829.64kN SL / 914.59kN Vac
// 101% Thrust: 838.00kN SL / 923.80kN Vac (operational)
// 110% Thrust: 912.60kN SL / 1006.05kN Vac
// ISP: 293s SL / 323s Vac
// Throttle: 40% - 110%
// Mass: 0.7t per engine
// 9 engines on S1, total liftoff thrust: 7542kN (9x838kN)
//
// === TQ-15A (ZQ-3) Engine Specs ===
// Gas Generator, Methalox, Vacuum optimized
// Thrust: 962.68kN Vac
// ISP: 340s Vac
// Throttle: 40% - 100%
// Mass: 0.8t
// S2 single engine
//
// === Flight Profiles ===
// 4t First Flight (Recovery): S1 129s + S2 378s → 9600 m/s
// 8t Mixed: S1 129s + S2 full burn → 9800 m/s
// 11.8t Expendable: S1+S2 full burn → 9800 m/s


// =============================================================================
// FIRST STAGE TANK
// Propellant: 395t → Volume: 395000/0.844 ≈ 468000 L
// Tank dry mass: 27.5t (40.3 S1 dry - 9x0.7 engines - 0.1 shell - 4x0.5 legs
//                   - 4x0.15 fins - 0.3 interstage - 2.5 fairing - 1.0 misc)
// =============================================================================

@PART[KCLV_Zhuque3_Stage1_Tank]:NEEDS[RealFuels]:FINAL
{
    @mass = 26.8
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 468000
        basemass = -1
        TANK
        {
            name = LqdMethane
            amount = Full
            maxAmount = 41.37%
        }
        TANK
        {
            name = LqdOxygen
            amount = Full
            maxAmount = 58.63%
        }
    }
}


// =============================================================================
// SECOND STAGE TANK + RCS
// Propellant: 114t → Volume: 114000/0.844 ≈ 135000 L
// Tank dry mass: 6.0t (6.8 S2 dry - 0.8 TQ-15A)
// Built-in RCS: Hydrazine, 10kN thrusters
// =============================================================================

@PART[KCLV_ZQ3_Stage_2]:NEEDS[RealFuels]:FINAL
{
    @mass = 6.0
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 135000
        basemass = -1
        TANK
        {
            name = ElectricCharge
            amount = 1000
            maxAmount = 1000
        }
        TANK
        {
            name = Hydrazine
            amount = 200
            maxAmount = 200
        }
        TANK
        {
            name = LqdMethane
            amount = Full
            maxAmount = 55767
        }
        TANK
        {
            name = LqdOxygen
            amount = Full
            maxAmount = 79033
        }
    }

    MODULE[ModuleRCSFX] {}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleRCS,*
        techLevel = 1
        origTechLevel = 1
        engineType = L
        origMass = 6.0
        configuration = Hydrazine
        modded = false
        CONFIG
        {
            name = Hydrazine
            thrusterPower = 0.5
            PROPELLANT
            {
                name = Hydrazine
                ratio = 1.0
                DrawGauge = true
            }
            atmosphereCurve
            {
                key = 0 290
                key = 1 200
            }
        }
    }
}


// =============================================================================
// INTERSTAGE — Decoupler + RCS fuel tank (Nitrogen cold gas)
// =============================================================================

@PART[KCLV_Zhuque3_Interstage]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.5
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}

    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 5010
        basemass = -1
        TANK
        {
            name = Nitrogen
            amount = 1000000
            maxAmount = 1000000
        }
        TANK
        {
            name = ElectricCharge
            amount = 10000
            maxAmount = 10000
        }
    }
}


// =============================================================================
// INTERSTAGE RCS — Nitrogen cold gas separation thrusters (fuel on Interstage)
// =============================================================================

@PART[KCLV_Zhuque3_Interstage_RCS]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.1

    @MODULE[ModuleRCSFX]
    {
        @stagingEnabled = true
        @thrusterPower = 2
        !resourceName = NULL
        !PROPELLANT[MonoPropellant] {}
        PROPELLANT
        {
            name = Nitrogen
            ratio = 1.0
        }
        @atmosphereCurve
        {
            @key = 0 165
            @key = 1 100
        }
    }
}


// =============================================================================
// GRID FIN (4x per vehicle)
// =============================================================================

@PART[KCLV_Zhuque3_Grid_Fin]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.15
}


// =============================================================================
// LANDING LEG (4x per vehicle)
// =============================================================================

@PART[KCLV_Zhuque3_Landing_Leg]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.5
}


// =============================================================================
// ENGINE CLUSTER MOUNT (structural shell, for 9x individual TQ-12A mounting)
// Used when building with 9x KCLV_TQ-12A_Series instead of the pre-built cluster
// =============================================================================

@PART[KCLV_Zhuque3_Stage1_Engine_Shell]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.4
}

// =============================================================================
// PAYLOAD FAIRING — 5.2m diameter, built-in decoupler + solid sep motor
// Fairing mass: 1.2t per half, ISP 254s Vac / 218s SL, 3u PEAN
// =============================================================================

@PART[KCLV_Zhuque3_5200_Fairing]:NEEDS[RealFuels]:FINAL
{
    @mass = 1.2
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
        @minThrust = 40
        @maxThrust = 40
        !PROPELLANT[*],* {}
        PROPELLANT
        {
            name = PBAN
            ratio = 1
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 264
            key = 1 218
        }
    }
    RESOURCE
    {
        name = PBAN
        amount = 40
        maxAmount = 40
    }

}

// =============================================================================
// PAYLOAD ADAPTER — Structural with built-in decoupler, avionics and reaction wheel
// =============================================================================

@PART[KCLV_ZQ3_Adapter]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.5
}
