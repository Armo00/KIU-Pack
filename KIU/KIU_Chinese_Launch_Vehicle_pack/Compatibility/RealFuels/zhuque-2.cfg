// Modified 2026-07-03

// Zhuque-2 Specification
// Gross mass: 214t 
// Payload to LEO: 4t
// First Stage TQ-12A burn time(estimation): 143.5s
// First Stage Propellant mass(estimation): 145t
// TQ-11 burn time(estimation): 587.4s
// TQ-12-vac burn time(estimation): 142.1s
// Second Stage Propellant mass(estimation): 50.5t

// TQ-12 Engine
// Gas Generator Engine
// Base: Methalox  ISP:286-324 Thrust:596-782.25  mass:0.8    TWR:99.71
// 100%: 745KN 105%: 782.25KN


// Zhuque-2 First Stage
// Gross mass: 160t    Dry mass: 15t      Fuel mass: 145t   Burn Time: 147s
// 4*TQ-12(3.2t) + 4*Tail(0.4t) + Interstage(0.2t) + Fueltank(11.2t)

@PART[KCLV_ZQ2_Stage_1]:NEEDS[RealFuels]:FINAL
{
    @mass = 11.2
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 171560
        basemass = -1
        TANK
        {
            name = LqdMethane
            amount = Full
            maxAmount = 41.37%
        }
        TANK
        {
            name = LqdOxygen
            amount = Full
            maxAmount = 58.63%
        }
    }

    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
        @minThrust = 120
        @maxThrust = 120
        !PROPELLANT[*],* {}
        PROPELLANT
        {
            name = PBAN
            ratio = 1
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 250
            key = 1 200
        }
    }
    RESOURCE
    {
        name = PBAN
        amount = 120
        maxAmount = 120
    }
}

@PART[KCLV_ZQ2_interstage_1-2]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.2
}

@PART[KCLV_ZQ_2_Wing]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.1
}

// Zhuque-2 Second Stage
// Gross mass: 54.5t    Dry mass: 3.5t      Fuel mass: 50.5t   Burn Time: 587.4s
// TQ-12-Vac(0.96t) + 4*TQ-11(0.4t) + Payload Adaptor(0.14t) + Fueltank(1.9t) + YQ-10(0.1t)

@PART[KCLV_ZQ2_Stage_2]:NEEDS[RealFuels]:FINAL
{
    @mass = 1.9
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 59900
        basemass = -1
        TANK
        {
            name = Hydrazine
            amount = 100
            maxAmount = 100
        }
        TANK
        {
            name = LqdMethane
            amount = Full
            maxAmount = 24739.26
        }
        TANK
        {
            name = LqdOxygen
            amount = Full
            maxAmount = 35060.74
        }
    }
    @MODULE[ModuleEngines*]
    {
        @name = ModuleEnginesRF
        @minThrust = 60
        @maxThrust = 60
        !PROPELLANT[*],* {}
        PROPELLANT
        {
            name = PBAN
            ratio = 1
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 250
            key = 1 200
        }
    }
    RESOURCE
    {
        name = PBAN
        amount = 60
        maxAmount = 60
    }
}

@PART[KCLV_ZQ2_Stage2_Engine_Bracket]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.1
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {
        name = ModuleFuelTanks
        type = ServiceModule
        volume = 100
        basemass = -1
        TANK
        {
            name = Hydrazine
            amount = 0
            maxAmount = 100
        }
    }
    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleRCS,*
        techLevel = 1
        origTechLevel = 1
        engineType = L
        origMass = 0.1
        configuration = Hydrazine
        modded = false
        CONFIG
        {
            name = Hydrazine
            thrusterPower = 0.5
            PROPELLANT
            {
                name = Hydrazine
                ratio = 1.0
                DrawGauge = true
            }
            atmosphereCurve
            {
                key = 0 290
                key = 1 250
            }
        }
    }
}

@PART[KCLV_ZQ2_Adapter]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.14
}

