// Modified 2026-07-02
// TweakScale patch for Zhuque-3 parts
// All parts use stack mode, default scale 4.5m

@PART[KCLV_Zhuque3*|KCLV_ZQ3*|KCLV_TQ-12A_Series*]:NEEDS[TweakScale,!RealFuels]
{
    !MODULE[TweakScale] {}
    %MODULE[TweakScale]
    {
        %type = KCLVStack
        %defaultScale = 2.8125
    }
}

@PART[KCLV_Zhuque3*|KCLV_ZQ3*|KCLV_TQ-12A_Series*]:NEEDS[TweakScale,RealFuels]
{
    !MODULE[TweakScale] {}
    %MODULE[TweakScale]
    {
        %type = KCLVStack
        %defaultScale = 4.5
    }
}
