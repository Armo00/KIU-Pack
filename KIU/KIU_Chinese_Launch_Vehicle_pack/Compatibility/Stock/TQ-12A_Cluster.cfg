// Stock mode backend: derive all engine-count modes from the base nine-engine module.
// RealFuels replaces the base module with one ModuleEnginesRF instead, so this patch is
// deliberately excluded whenever RealFuels is installed.
@PART[KCLV_TQ-12A_Series_Engine_Cluster]:NEEDS[!RealFuels]:FINAL
{
    @MODULE[ModuleEnginesFX],0
    {
        @engineID = TQ12A_V3_Stock_Mode9
        @engineName = TQ-12A 9-Engine Cluster
        @thrustVectorTransformName = thrustTransform
        @runningEffectName = running_9
    }

    +MODULE[ModuleEnginesFX],0
    {
        @engineID = TQ12A_V3_Stock_Mode1
        @engineName = TQ-12A 1-Engine Cluster
        @thrustVectorTransformName = thrustTransform1
        @runningEffectName = running_1
        @maxThrust *= 0.111111111
        @minThrust *= 0.111111111
    }

    +MODULE[ModuleEnginesFX],0
    {
        @engineID = TQ12A_V3_Stock_Mode3
        @engineName = TQ-12A 3-Engine Cluster
        @thrustVectorTransformName = thrustTransform3
        @runningEffectName = running_3
        @maxThrust *= 0.333333333
        @minThrust *= 0.333333333
    }

    +MODULE[ModuleEnginesFX],0
    {
        @engineID = TQ12A_V3_Stock_Mode5
        @engineName = TQ-12A 5-Engine Cluster
        @thrustVectorTransformName = thrustTransform5
        @runningEffectName = running_5
        @maxThrust *= 0.555555556
        @minThrust *= 0.555555556
    }
}
