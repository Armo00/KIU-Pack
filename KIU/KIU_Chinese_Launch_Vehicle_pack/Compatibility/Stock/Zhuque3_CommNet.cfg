// Stock CommNet fallback for the autonomous Zhuque-3 stages.
// RemoteTech supplies its own SPU and antenna modules when installed.
@PART[KCLV_Zhuque3_Stage1_Tank|KCLV_ZQ3_Stage_2]:NEEDS[!RemoteTech]:FINAL
{
    %MODULE[ModuleDataTransmitter]
    {
        %antennaType = DIRECT
        %packetInterval = 0.35
        %packetSize = 2
        %packetResourceCost = 12.0
        %requiredResource = ElectricCharge
        %antennaPower = 5000000
        %antennaCombinable = True
    }
}
