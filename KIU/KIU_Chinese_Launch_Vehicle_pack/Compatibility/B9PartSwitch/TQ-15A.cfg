// TQ-15A B9PartSwitch — engine mount variant + node position
// Stock uses rescaleFactor=0.6, RF uses rescaleFactor=1.0
// RF node positions: 2.02577 / 2.29978 / 1.81249
// Stock node positions: RF values × 0.6

// === Common: add B9PS module (not present in part CFG) ===
@PART[KCLV_TQ15A]:NEEDS[B9PartSwitch]
{
    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = TQ15A_Mount
        switcherDescription = #KCLV_TQ15A_switcherDescription

        SUBTYPE
        {
            name = ZQ-2
            displayName = #ZQ-2
            transform = Mount_base1
            NODE
            {
                name = top
                position = 0.0, 2.02577, 0.0
                size = 1
            }
        }
        SUBTYPE
        {
            name = ZQ-3
            displayName = #ZQ-3
            transform = Mount_base2
            NODE
            {
                name = top
                position = 0.0, 2.29978, 0.0
                size = 1
            }
        }
        SUBTYPE
        {
            name = original
            displayName = #original
            transform = Mount_base3
            NODE
            {
                name = top
                position = 0.0, 1.81249, 0.0
                size = 1
            }
        }
    }
}

// === Stock: rescaleFactor=0.6, adjust node positions ===
@PART[KCLV_TQ15A]:NEEDS[B9PartSwitch,!RealFuels]:FINAL
{
    @MODULE[ModuleB9PartSwitch]
    {
        @SUBTYPE[ZQ-2]
        {
            @NODE[top]
            {
                @position = 0.0, 3.37628, 0.0
            }
        }
        @SUBTYPE[ZQ-3]
        {
            @NODE[top]
            {
                @position = 0.0, 3.83297, 0.0
            }
        }
        @SUBTYPE[original]
        {
            @NODE[top]
            {
                @position = 0.0, 3.02082, 0.0
            }
        }
    }
}
